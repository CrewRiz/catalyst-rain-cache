<svg xmlns="http://www.w3.org/2000/svg" width="760" height="430" viewBox="0 0 760 430"><rect width="100%" height="100%" fill="#fbfaf7"/><text x="56" y="44" font-family="Inter, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#111827">Breakthrough Verdict</text><text x="56" y="70" font-family="Inter, Helvetica, Arial, sans-serif" font-size="13" fill="#4b5563">Breakthrough where fixed-state evidence is strong; not yet where full KV equivalence is unproven.</text><line x1="70" y1="330" x2="690" y2="330" stroke="#d1d5db"/><rect x="50" y="80.00" width="68" height="250.00" rx="5" fill="#0f766e"/><text x="84.0" y="72.00" text-anchor="middle" font-size="11" fill="#111827">100/100</text><text x="84.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Fixed-state recall</text><rect x="162" y="80.00" width="68" height="250.00" rx="5" fill="#2563eb"/><text x="196.0" y="72.00" text-anchor="middle" font-size="11" fill="#111827">100/100</text><text x="196.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Stateless handoff</text><rect x="274" y="80.00" width="68" height="250.00" rx="5" fill="#0891b2"/><text x="308.0" y="72.00" text-anchor="middle" font-size="11" fill="#111827">100/100</text><text x="308.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Tier-two suite</text><rect x="386" y="135.00" width="68" height="195.00" rx="5" fill="#4f46e5"/><text x="420.0" y="127.00" text-anchor="middle" font-size="11" fill="#111827">78/100</text><text x="420.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Next tier</text><rect x="498" y="80.00" width="68" height="250.00" rx="5" fill="#b45309"/><text x="532.0" y="72.00" text-anchor="middle" font-size="11" fill="#111827">100/100</text><text x="532.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Lossless KV</text><rect x="610" y="217.50" width="68" height="112.50" rx="5" fill="#7c2d12"/><text x="644.0" y="209.50" text-anchor="middle" font-size="11" fill="#111827">45/100</text><text x="644.0" y="362" text-anchor="middle" font-size="9" fill="#111827">Compact equiv.</text></svg>
