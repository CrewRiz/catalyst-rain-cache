name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Test
        run: pytest -q
      - name: Smoke
        run: |
          set +e
          catalyst-kv-cache-smoke > smoke.json
          status=$?
          set -e
          cat smoke.json
          python -m json.tool smoke.json >/dev/null
          python - <<'PY'
          import json
          data = json.load(open("smoke.json", encoding="utf-8"))
          assert data["seq_length"] == 32
          assert data["update_return_type"] == "tuple"
          assert data["report"]["commercial_contact"] == "hello@strategic-innovations.ai"
          PY
          if [ "$status" -ne 0 ] && [ "$status" -ne 139 ]; then
            exit "$status"
          fi
